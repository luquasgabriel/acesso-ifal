{% extends "base.html" %}
{% load static %}

{% block title %}Email enviado - Acesso IFAL{% endblock title %}

{% block body %}
<main class="grid min-h-screen bg-base-200 lg:grid-cols-2">
    <section class="flex items-center justify-center p-4 sm:p-8">
        <div class="card w-full max-w-md bg-base-100 shadow-sm">
            <div class="card-body items-center text-center">
                <div class="badge badge-info badge-lg">Email enviado</div>
                <h1 class="text-3xl font-bold">Verifique sua caixa de entrada</h1>
                <p class="text-sm text-base-content/60">Se o email estiver cadastrado, o link de redefinição será enviado.</p>
                <a href="{% url 'login' %}" class="btn btn-primary w-full">Voltar ao login</a>
            </div>
        </div>
    </section>
    <section class="hidden items-center justify-center bg-secondary p-8 lg:flex">
        <div class="text-center">
            <img src="{% static 'images/logo_ifal_login.png' %}" alt="IFAL" class="mx-auto h-20 w-auto">
            <h2 class="mt-6 text-3xl font-bold">Acesso IFAL</h2>
        </div>
    </section>
</main>
{% endblock body %}
