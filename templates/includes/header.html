<header class="navbar min-h-16 border-b border-base-300 bg-base-100 px-4 lg:px-8">
    <div class="flex-1">
        <label for="dashboard-drawer" class="btn btn-ghost btn-square lg:hidden" aria-label="Abrir menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </label>
        <div class="hidden sm:block">
            <p class="text-sm font-medium">Acesso IFAL</p>
            <p class="text-xs text-base-content/60">Controle de salas por RFID</p>
        </div>
    </div>

    <div class="flex-none gap-2">
        <button class="btn btn-ghost btn-square" aria-label="Notificações">
            <div class="indicator">
                <span class="indicator-item badge badge-primary badge-xs"></span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </div>
        </button>

        <div class="avatar placeholder">
            <div class="w-8 rounded-full bg-primary text-primary-content">
                <span class="text-sm font-semibold">{{ user.get_full_name|default:user.username|first|upper }}</span>
            </div>
        </div>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-ghost btn-square text-error" aria-label="Sair" title="Sair">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
                </svg>
            </button>
        </form>
    </div>
</header>
