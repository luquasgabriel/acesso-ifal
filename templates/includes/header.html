<header class="navbar min-h-16 border-b border-base-300 bg-base-100 px-4 lg:px-8">
    <div class="flex-1">
        <label for="dashboard-drawer" class="btn btn-ghost btn-square lg:hidden" aria-label="Abrir menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </label>
        <div class="hidden sm:block">
            <p class="text-sm font-medium">Acesso IFAL</p>
            <p class="text-xs text-base-content/60">Controle de salas por RFID</p>
        </div>
    </div>

    <div class="flex-none gap-2">
        <button class="btn btn-ghost btn-square" aria-label="Notificações">
            <div class="indicator">
                <span class="indicator-item badge badge-primary badge-xs"></span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </div>
        </button>

        <div class="dropdown dropdown-end">
            <button tabindex="0" class="btn btn-ghost gap-2">
                <div class="avatar placeholder">
                    <div class="w-8 rounded-full bg-primary text-primary-content">
                        <span class="text-sm font-semibold">{{ user.get_full_name|default:user.username|first|upper }}</span>
                    </div>
                </div>
                <span class="hidden max-w-36 truncate text-sm sm:inline">{{ user.get_full_name|default:user.username }}</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <ul tabindex="0" class="menu dropdown-content z-50 mt-3 w-56 rounded-box bg-base-100 p-2 shadow">
                <li class="menu-title"><span>Conta</span></li>
                {% if user.is_staff %}
                <li><a href="{% url 'admin:index' %}">Administração</a></li>
                {% endif %}
                <li class="menu-title"><span>Sessão</span></li>
                <li>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="text-error">Sair</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</header>
