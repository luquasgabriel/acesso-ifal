<header class="navbar min-h-16 border-b border-base-300 bg-base-100 px-4 lg:px-8">
    <div class="flex-1">
        <label for="dashboard-drawer" class="btn btn-ghost btn-square lg:hidden" aria-label="Abrir menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </label>
        <div class="hidden sm:block">
            <p class="text-sm font-medium">Acesso IFAL</p>
            <p class="text-xs text-base-content/60">Controle de salas por RFID</p>
        </div>
    </div>

    <div class="flex flex-none items-center gap-3">
        {% with display_name=user.get_full_name|default:user.username %}
        <img
            src="https://ui-avatars.com/api/?name={{ display_name|urlencode }}&background=67C180&color=ffffff&bold=true&size=64&rounded=true"
            alt="{{ display_name }}"
            class="shrink-0 rounded-full object-cover"
            style="width: 28px; height: 28px;"
        />
        <span class="hidden max-w-44 truncate text-sm font-medium sm:inline">
            {{ display_name }}
        </span>
        <button type="button" class="btn btn-ghost btn-square" onclick="toggleDarkMode()" aria-label="Alternar tema" title="Alternar tema">
            <span id="themeIconMoon">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                </svg>
            </span>
            <span id="themeIconSun" class="hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.36-6.36l-1.42 1.42M7.06 16.94l-1.42 1.42m12.72 0l-1.42-1.42M7.06 7.06L5.64 5.64M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
            </span>
        </button>
        <form method="post" action="{% url 'logout' %}" class="m-0 flex items-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-ghost btn-square text-error" aria-label="Sair" title="Sair">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" />
                </svg>
            </button>
        </form>
        {% endwith %}
    </div>
</header>
